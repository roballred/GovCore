name: Release

# Changesets release automation for the public npm @govcore scope.
#
# DORMANT BY DEFAULT. Both jobs are skipped unless the repo variable
# `NPM_PUBLISH` is set to `true`. To turn releasing on:
#   1. add an `NPM_TOKEN` secret with publish rights to the @govcore scope, and
#   2. set repository variable `NPM_PUBLISH=true`.
#
# Publishing to npm is MANUAL. The two responsibilities are split so a merge to
# main never pushes to npm on its own:
#
#   - `version` (automatic, on push to main): keeps the "Version Packages" PR up
#     to date by aggregating pending changesets. It NEVER publishes — merging it
#     just lands the version bumps + CHANGELOGs on main, staged and waiting.
#   - `publish` (manual, on workflow_dispatch): runs `changeset publish`, pushing
#     the currently-versioned packages to npm and tagging the release.
#
# So the release always waits at "versioned on main" until a maintainer explicitly
# runs the workflow (Actions → Release → Run workflow) to deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency: release-${{ github.ref }}

jobs:
  # Automatic: maintain the "Version Packages" PR only. No npm access, no publish.
  version:
    if: ${{ vars.NPM_PUBLISH == 'true' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          # `version` only — no `publish`, so this run opens/updates the
          # "Version Packages" PR and never pushes to npm.
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Manual: publish the currently-versioned packages to npm on demand.
  publish:
    if: ${{ vars.NPM_PUBLISH == 'true' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      # Compile dist/ (bins + types) before publishing the packages.
      - run: pnpm build --filter='./packages/*'
      # Publishes any package whose version is not yet on npm, and tags the release.
      - run: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
