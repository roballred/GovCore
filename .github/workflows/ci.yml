name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is read automatically from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter govea exec tsc --noEmit
        # tsc uses apps/govea/tsconfig.json (strict: true, noEmit: true)
        # No database connection needed — Drizzle types are static schema definitions

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter govea lint

  docs-lint:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint business-architecture docs against STYLE.md
        run: node scripts/lint-business-architecture.mjs

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    env:
      # No live database needed — all DB-querying pages are force-dynamic or
      # implicitly dynamic via auth() → cookies(). The postgres driver is lazy
      # and won't connect until a query is executed at request time.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/govea
      AUTH_SECRET: ci-build-secret-not-for-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm --filter govea build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: govea
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/govea
      AUTH_SECRET: ci-integration-secret-not-for-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bump max_connections from the postgres:16-alpine default of 100 to 200
      # so the integration suite has headroom while the underlying connection
      # leak in server actions is investigated. See #475 for the diagnostic
      # and follow-ups. max_connections is a restart-required setting, so
      # ALTER SYSTEM is paired with `docker restart` of the service container.
      - name: Bump Postgres max_connections
        run: |
          docker exec ${{ job.services.postgres.id }} psql -U postgres -d govea -c "ALTER SYSTEM SET max_connections = 200;"
          docker restart ${{ job.services.postgres.id }}
          for i in {1..20}; do
            if docker exec ${{ job.services.postgres.id }} pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres ready after restart"
              break
            fi
            sleep 1
          done

      - name: Push schema to database
        run: pnpm --filter govea db:push --force

      - name: Apply DB triggers (audit_log immutability, etc.)
        run: pnpm --filter govea db:apply-triggers:container

      - name: Run integration tests
        run: pnpm --filter govea test:integration

  smoke:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: govea
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/govea
      AUTH_SECRET: ci-smoke-secret-not-for-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (Chromium only)
        run: pnpm --filter govea exec playwright install --with-deps chromium

      - name: Push schema to database
        run: pnpm --filter govea db:push --force

      - name: Apply DB triggers (audit_log immutability, etc.)
        run: pnpm --filter govea db:apply-triggers:container

      # The db:seed script uses `tsx --env-file .env.local`.  Create an empty
      # placeholder so tsx does not fail on the missing file.  All real env
      # vars flow in from the job-level `env:` block above.
      - name: Create placeholder .env.local
        run: touch apps/govea/.env.local

      - name: Seed database
        run: pnpm --filter govea db:seed
        env:
          DEV: "true"

      - name: Run E2E smoke tests
        # smoke.spec.ts is the route-health sweep; overview.spec.ts (#614)
        # adds role-aware /overview CTA-gating + Coming-next-tile coverage.
        # a11y.spec.ts (#766) runs axe-core WCAG 2.1 A/AA checks over the
        # same routes — serious/critical violations fail the build.
        # logout.spec.ts (#759) pins sign-out from admin + instance routes;
        # it only clears cookies in its own contexts (JWT sessions), so it
        # is CI-safe. Other specs (iam.spec.ts, auth-security.spec.ts)
        # intentionally stay out of CI for now — they mutate app state and
        # are run locally.
        run: pnpm --filter govea exec playwright test tests/e2e/specs/smoke.spec.ts tests/e2e/specs/overview.spec.ts tests/e2e/specs/a11y.spec.ts tests/e2e/specs/logout.spec.ts tests/e2e/specs/value-streams.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/govea/playwright-report/
          retention-days: 7
