name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Typecheck the publishable packages only. Example apps (next build) need
      # runtime env/DB and are exercised by the integration job instead.
      - run: pnpm build --filter='./packages/*'
      - run: pnpm test
      # Edge-safety gate (§575): the packages a consumer imports in an edge
      # runtime must pull no node: builtin or DB client, or every consumer's
      # middleware silently breaks. Bundles schema/rbac/middleware for an
      # edge-like target and fails on a node:/DB-client import.
      - run: pnpm check:edge

  canary:
    name: Canary consumer build (examples/minimal-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Packages ship compiled dist/ now — build them so the consumer resolves
      # the published artifacts (not source), which is what makes the no-config
      # consume real.
      - run: pnpm build --filter='./packages/*'
      # §576 + #71: the minimal-app is the canary — "does a real consumer still
      # compile, with NO transpilePackages and no build config?". It exercises
      # auth, tenancy, RBAC, middleware, the theme, and the content engine (a
      # `note` type → generated actions + screens). The build connects to
      # nothing (dynamic pages); the dummy URL just satisfies the lazy postgres
      # client at module load.
      - run: pnpm --filter @govcore/example-minimal-app build
        env:
          DATABASE_URL: postgresql://localhost:5432/build

  integration:
    name: Integration (Postgres — migrations, audit trigger, RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Packages ship compiled dist/ now — build them so tsx resolves the
      # compiled entrypoints (schema/migrate, content/screens, etc.).
      - run: pnpm build --filter='./packages/*'
      # Drives examples/smoke: govcore-migrate, rbac/tenancy/audit, the
      # audit-immutability trigger, and RLS cross-org isolation under a
      # non-owner role — the highest-risk paths that need a real Postgres.
      - run: pnpm smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
