name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Typecheck the publishable packages only. Example apps (next build) need
      # runtime env/DB and are exercised by the integration job instead.
      - run: pnpm build --filter='./packages/*'
      - run: pnpm test

  integration:
    name: Integration (Postgres — migrations, audit trigger, RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Drives examples/smoke: govcore-migrate, rbac/tenancy/audit, the
      # audit-immutability trigger, and RLS cross-org isolation under a
      # non-owner role — the highest-risk paths that need a real Postgres.
      - run: pnpm smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
